<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login POKIMON</title>
    <link rel="stylesheet" href="../Css/login.css">
</head>
<body>
    <center>
    <header>
        <h1>BIENVENIDO AL MUNDO POKIMON</h1>
    </header>
    <div class="container">
        <p>Bienvenido a mi primer juego en JavaScript</p>
        <hr>
        <div class="form">
            <label for="username">Username</label>
            <br>
            <input type="text" id="username">
            <br>
            <label for="password">Password</label>
            <br>
            <input type="password" id="password">
            <br>
            <label for="email">Email</label>
            <br>
            <input type="email" id="email">
            <br>
            <label for="phone">Phone</label>
            <br>
            <input type="tel" id="phone">
            <br>
            <label for="age">Age</label>
            <br>
            <input type="text" id="age">
            <br>
            <label for="favoriteGame">Favorite Game</label>
            <br>
            <input type="text" id="favoriteGame">
            <br>
            <label for="gamingPlatform">Gaming Platform</label>
            <br>
            <input type="text" id="gamingPlatform">
            <br>
            <label for="favoriteGenre">Favorite Genre</label>
            <br>
            <input type="text" id="favoriteGenre">
            <br>
            <label for="gamerTag">Gamer Tag</label>
            <br>
            <input type="text" id="gamerTag">    <br>
            <label for="id">ID</label>
            <br>
            <input type="text" id="id">
            <br>
            <button onclick="Inicio()">Iniciar sesion</button>
        </div>
    </div>
    </center>
    <script src="../Js/index.js"></script>
</body>
</html>
